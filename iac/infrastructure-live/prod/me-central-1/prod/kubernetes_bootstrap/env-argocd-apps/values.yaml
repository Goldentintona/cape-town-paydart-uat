applications:
  app:
    namespace: argocd
    project: default
    source:
      repoURL: https://github.com/Goldentintona/cape-town-paydart.git
      targetRevision: main
      path: kubernetes/charts/generic-chart
      helm:
        valueFiles:
          - app/uat/values.yaml
          - secrets://app/uat/values-enc.yaml
        releaseName: app
    destination:
      server: https://kubernetes.default.svc
      namespace: backend
    syncPolicy: {}
    revisionHistoryLimit: 5
