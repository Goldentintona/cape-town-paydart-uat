grafana:
  enabled: true
  adminUser: gti-admin
  adminPassword: "gtiAdmin123456!"
  service:
    type: ClusterIP

  grafana.ini:
    server:
      domain: uat-monitoring.gtipayglobal.com
      root_url: https://uat-monitoring.gtipayglobal.com

prometheus:
  prometheusSpec:
    retention: 15d

alertmanager:
  enabled: true

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

defaultRules:
  create: true