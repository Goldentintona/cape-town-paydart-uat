# Additional ConfigMaps
configMap:
  enabled: false
  additionalLabels:
  # key: value
  annotations:
  # key: value
  files:
  # - nameSuffix: dev-config
  #   data:
  #     key1: value1
  #     key2: value2

# Additional Secrets
secret:
  enabled: false
  additionalLabels:
  # key: value
  annotations:
  # key: value
  files:
  # - nameSuffix: credentials
  #   data:
  #     secretKey1: secretValue1
  #     secretKey2: secretValue2
  # - nameSuffix: password
  #   data:
  #     secretKey1: secretValue1
  #     secretKey2: secretValue2
# Service Monitor to collect Prometheus metrices
serviceMonitor:
  enabled: false

  # Additional labels
  additionalLabels:
  # key: value

  # Additional annotations
  annotations:
  # key: value

  # List of the endpoints of service from which prometheus will scrape data
  endpoints:
    - interval: 10s
      path: /actuator/prometheus
      port: http

logging:
  enabled: false
  flows:
    # - name: "flow-name"
    #   globalOutputRefs:
    #     - paydart-output
    #   filters:
    #     - grep:
    #         regexp:
    #           - key: log
    #             pattern: /^\d{4}-\d{2}-\d{2}(.*)$/
    #     - tag_normaliser: {}
    #     - parser:
    #         remove_key_name_field: true
    #         reserve_data: true
    #         parse:
    #           type: regexp
    #           expression: >-
    #             /^(?<logTime>[^\s]*)\s\[(?<traceId>[^]]*)\]\s\[(?<spanId>[^]]*)\]\s(?<logLevel>[^\s]*)\s+\[(?<threadId>[^]]*)\]\s(?<className>[^:]*):\s(?<logMessage>(.*))$/
    - name: "flow-name2"
      localOutputRefs:
        - paydart-output
      filters:
        - stdout:
            output_type: json
        - tag_normaliser: {}
        - parser:
            parse:
              type: json
            remove_key_name_field: true
            reserve_data: true
        - record_modifier:
            remove_keys: "$.kubernetes.host,$.kubernetes.kubernetes_namespace,$.kubernetes.annotations,$.kubernetes.labels,$.kubernetes_namespace"

# autoscaling is used for horizonal pod autoscaling
autoscaling:
  # enabled is a boolean flag for enabling or disabling autoscaling
  enabled: true
  additionalLabels:
  annotations:
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 900
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Max

poddisruptionbudget:
  enabled: false # if you enable this, make sure your deployment creates atleast minAvailable+1 pods for no downtime deployment
  minAvailable: 1

application:
  enabled: false
  argocd_namespace: argocd-install-namespace
  deployment_namespace: default
  repo_path: infra/kubernetes/charts
  repoURL: git@github.com:umairedu/onboarding-project.git
  branch: master
  helm:
    valueFiles:
      - production/values.yaml
      - secrets://production/values-enc.yaml
  syncPolicy: {}
  #    automated:
  #      prune: false
  #      selfHeal: true
  #    syncOptions:
  #      - CreateNamespace=true
  #      - Replace=true
  #      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 5
