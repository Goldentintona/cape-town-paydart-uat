  # Service Account to use by pods
  serviceAccount:
    enabled: false
    name: ""

  terrafrom_serviceAccount:
    created: true

    # Additional Labels on service account
    additionalLabels:
    # key: value

    # Annotations on service account
    annotations:
    # key: value

  existingRoles:
  # - name: springboot

  # Create Roles (Namespaced)
  roles:
