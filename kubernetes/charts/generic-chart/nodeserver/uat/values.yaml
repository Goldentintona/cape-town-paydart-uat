# Name of the application.
applicationName: "nodeserver"
environment: uat
#tier: backend

# These labels will be added on all resources, and you can add additional labels from below on individual resource
labels:
  group: paydart-generic-helm
deployment:
  enabled: true
  # By default deploymentStrategy is set to rollingUpdate
  # You can change type to `Recreate` or can uncomment `rollingUpdate` specification and adjust them to your usage.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  # Select nodes to deploy which matches the following labels
  nodeSelector:
    orange: "true"

  # nodeSelector:
  # cloud.google.com/gke-nodepool: default-pool

  # If needed to setup host aliases
  hostAliases:
  # - ip: "127.0.0.1"
  #   hostnames:
  #   - "foo.local"
  #   - "bar.local"

  # Init containers which runs before the app container
  initContainers:
    - name: init
      image: busybox
      command:
        [
          "sh",
          "-c",
          'if [[ ! -e "$dir" ]]; then echo "Creating directory $dir"; mkdir -p "$dir"; elif [[ ! -d "$dir" ]]; then echo "$dir already exists but is not a directory" 1>&2; else echo "$dir already exists"; fi',
        ]
      env:
        - name: dir
          value: "/ops/node-server/public"
      volumeMounts:
        - mountPath: /ops
          name: nfs-root

  # Additional labels for Deployment
  additionalLabels:
  # key: value

  # Additional label added on pod which is used in Service's Label Selector
  podLabels:
    admission.datadoghq.com/enabled: "true"
    tags.datadoghq.com/env: uat
    tags.datadoghq.com/service: nodeserver

  # Pod Annotations on deployments for OT
  podAnnotations:
    instrumentation.opentelemetry.io/inject-nodejs: "true"
    instrumentation.opentelemetry.io/container-names: "nodeserver"
    admission.datadoghq.com/enabled: "true"
    tags.datadoghq.com/env: uat
    tags.datadoghq.com/service: nodeserver

  # Annotations on deployments
  annotations:

  # Additional Pod Annotations added on pod created by this Deployment
  additionalPodAnnotations:
  # key: value

  # Replicas to be created
  replicas: 2

  # Revision History Limit for Replica Sets
  revisionHistoryLimit: 4

  # Secrets used to pull image
  imagePullSecrets: "docker-hub"

  # If want to mount Envs from configmap or secret
  envFrom:
  # - type: configmap
  #   name: my-configmap
  #  - type: secret
  #    name: ""
  #    nameSuffix: db
  #Only one choice is valid: either nameSuffix or name

  # Environment variables to be passed to the app container
  env:
    - name: app-name
      value: "nodeserver"
    - name: DD_ENV
      value: uat
    - name: DD_PROFILING_ENABLED
      value: "true"
    - name: DD_SERVICE
      value: nodeserver
    - name: DD_RUNTIME_METRICS_ENABLED
      value: "true"
    - name: DD_LOGS_INJECTION
      value: "true"
    - name: DD_TRACE_SAMPLE_RATE
      value: "true"

  # Volumes to be added to the pod
  volumes:
    - name: public
      nfs:
        path: /node-server/public
        server: fs-0f4f8f38375f980d5.efs.af-south-1.amazonaws.com
    - name: nfs-root
      nfs:
        path: /
        server: fs-0f4f8f38375f980d5.efs.af-south-1.amazonaws.com
    - secret:
        defaultMode: 420
        secretName: nodeserver-config
        optional: false
      name: env

  # - name: configmap-volume
  #   configMap:
  #     name: '{{ template "application.name" . }}-configmap-nameSuffix'
  # - name: secret-volume
  #   secret:
  #     secretName: secret-name
  # - name: volume-name
  #   emptyDir: {}
  # - name: persistent-volume-name
  #   persistentVolumeClaim:
  #     claimName: claim-name

  # Mount path for Volumes
  volumeMounts:
    - mountPath: /nodecode/public
      name: public
    - mountPath: /nodecode/.env
      name: env
      readOnly: true
      subPath: env

  # Taint tolerations for nodes
  tolerations:
    - effect: NoSchedule
      key: workload
      operator: Equal
      value: orange
  # replace "backend" with "orange" when the VPN and all routes are ready

  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "app"
  #   effect: "NoSchedule"

  # Pod affinity and pod anti-affinity allow you to specify rules about how pods should be placed relative to other pods.
  affinity:
  #  nodeAffinity:
  #    requiredDuringSchedulingIgnoredDuringExecution:
  #      nodeSelectorTerms:
  #      - matchExpressions:
  #        - key: disktype
  #          operator: In
  #          values:
  #          - ssd

  # Image of the app container
  image:
    repository: pdsrvcprovider/nodeserver
    tag: "build-979"
    pullPolicy: IfNotPresent
    appprefix:
      enabled: true

  command: ["/usr/bin/tini", "-vvv", "--"]
  baseArgs:
    [
      "pm2-runtime",
      "server.js",
      "--log",
      "/nodecode/public/logs/app.log",
      "--error",
      "/nodecode/public/logs/app-error.log",
    ]

  # Container Security Context
  containerSecurityContext:
    []
    # privileged: false
    # allowPrivilegeEscalation: false
    # capabilities:
    #   drop:
    #     - ALL
    #   add:
    #     - NET_BIND_SERVICE
    #     - SETGID
    #     - SETUID

  # Pod Security Context
  securityContext:
    []
    # fsGroup: 0
    # runAsUser: 0
    # runAsGroup: 0
    # fsGroupChangePolicy: "OnRootMismatch"
    # sysctls:
    # - name: net.ipv4.ip_unprivileged_port_start
    #   value: "0"

  service:
    port:
      - name: web
        containerPort: 4000
        protocol: TCP

  # Readiness and Liveness probes
  readinessProbe:
    failureThreshold: 3
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 1
    initialDelaySeconds: 10
    httpGet:
      path: /health
      port: web
  livenessProbe:
    failureThreshold: 3
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 1
    initialDelaySeconds: 30
    httpGet:
      path: /health
      port: web

  # Resources to be defined for pod
  resources:
    limits:
      memory: 5Gi
      cpu: 2500m
    requests:
      memory: 4Gi
      cpu: 2000m

  # Add additional containers besides init and app containers
  additionalContainers:
  # - name: sidecar-contaner
  #   image: busybox
  #   imagePullPolicy: IfNotPresent
  #   command: ['/bin/sh']

# Add Storage volumes to the pods
persistence:
  enabled: false
  mountPVC: false
  mountPath: "/nodecode/public"
  accessMode: ReadWriteMany
  ## If defined, storageClass: <storageClass>
  ## If set to "-", storageClass: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClass spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  storageClass: "app-storage"
  additionalLabels:
  # key: "value"
  annotations:
  #  "helm.sh/resource-policy": keep
  storageSize: 100Gi

# Service object for servicing pods
service:
  enabled: true
  type: ClusterIP
  port:
    - port: 80
      targetPort: 4000
      protocol: TCP
      name: web

# Ingress object for exposing services
ingress:
  enabled: true
  #The load balancer name and group name should be the same across all application Helm files
  loadbalancername: global
  groupname: generic
  awssubnets: "subnet-0c5198bc59d798f66, subnet-0f1a89c21157f9b3a, subnet-0cb93dd6a6dbad6cd"
  wafarn: ""

  ingressClassName: alb
  # Port of the service that serves pods
  servicePort: 80

  # List of host addresses to be exposed by this Ingress
  hosts:
    - host: uat-nodeserver.gtipayglobal.com
      paths:
        - path: /
          pathType: Prefix

  # Add annotations to this Ingress
  annotations:
    # nginx.ingress.kubernetes.io/affinity: cookie
    # nginx.ingress.kubernetes.io/session-cookie-path: /
    # nginx.ingress.kubernetes.io/use-regex: 'true'
    # nginx.ingress.kubernetes.io/proxy-connect-timeout: '180'
    # nginx.ingress.kubernetes.io/proxy-read-timeout: '180'
    # nginx.ingress.kubernetes.io/proxy-send-timeout: '180'
    alb.ingress.kubernetes.io/ip-address-type: ipv4
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=240
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400, load_balancing.algorithm.type=least_outstanding_requests
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "4000"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/actions.redirect-to-www: >
      {"Type":"redirect","RedirectConfig":{"Host":"#{host}","Port":"443","Protocol":"HTTPS","StatusCode":"HTTP_302"}}

